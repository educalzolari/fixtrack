    <script>
      function _initials(name) {
        return (name || '?').trim().split(/\s+/).slice(0, 2).map(w => (w[0] || '').toUpperCase()).join('');
      }

      async function renderClientes(query) {
        const grid = document.getElementById('clientesGrid');
        let clientes = [];
        try { clientes = await dbLoadClientes(); } catch {}
        const reps = window.repairs || [];
        const q = (query || '').toLowerCase().trim();
        const filtered = q ? clientes.filter(c => (c.nombre + ' ' + (c.telefono || '')).toLowerCase().includes(q)) : clientes;

        if (!filtered.length) {
          grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-ico"><svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div><h3>${q ? 'Sin resultados' : 'No hay clientes registrados'}</h3><p>${q ? 'ProbÃ¡ con otro nombre o telÃ©fono.' : 'Los clientes aparecen acÃ¡ cuando creÃ¡s una reparaciÃ³n.'}</p></div>`;
          return;
        }

        grid.innerHTML = filtered.map(c => {
          const count = reps.filter(r => r.cliente?.toLowerCase().trim() === c.nombre?.toLowerCase().trim()).length;
          return `<div class="client">
            <div class="avatar">${_initials(c.nombre)}</div>
            <div class="client-info">
              <div class="client-name">${escapeHtml(c.nombre)}</div>
              <div class="client-meta">${c.telefono ? escapeHtml(c.telefono) : 'Sin telÃ©fono'}</div>
            </div>
            <div class="client-stat">
              <b class="num">${count}</b>
              <span>trabajos</span>
            </div>
          </div>`;
        }).join('');
      }

      document.getElementById('clienteSearchInput')?.addEventListener('input', e => renderClientes(e.target.value));
      /* Se llama cuando app.js termina de cargar repairs */
      document.addEventListener('repairsLoaded', () => renderClientes());
      setTimeout(() => renderClientes(), 1000);
    </script>
