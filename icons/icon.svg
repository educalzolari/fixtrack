<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg-glow" cx="38%" cy="32%" r="60%">
      <stop offset="0%" stop-color="#5b21b6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#5b21b6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d8b4fe"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="wrench-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#13121f"/>
  <rect width="512" height="512" rx="112" fill="url(#bg-glow)"/>

  <!-- Wrench — centered top area, scaled from 24x24 lucide path -->
  <g transform="translate(256,195) scale(9.5)" stroke="url(#wrench-grad)" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <g transform="translate(-12,-12)">
      <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
    </g>
  </g>

  <!-- "1FT" monogram -->
  <text
    x="256" y="370"
    text-anchor="middle"
    font-family="'Space Grotesk', system-ui, sans-serif"
    font-weight="800"
    font-size="118"
    letter-spacing="-4"
    fill="url(#text-grad)">1FT</text>

  <!-- "FIXTRACK" subtitle -->
  <text
    x="256" y="428"
    text-anchor="middle"
    font-family="'Space Grotesk', system-ui, sans-serif"
    font-weight="600"
    font-size="36"
    letter-spacing="8"
    fill="#7c3aed"
    opacity="0.75">FIXTRACK</text>
</svg>
