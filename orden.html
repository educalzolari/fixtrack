<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ticket | 1Fixtrack!</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        background: #e5e5e5;
        font-family: 'Hanken Grotesk', Arial, sans-serif;
        font-size: 13px;
        color: #000;
        padding: 32px 16px 80px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* ── Contenedor del ticket ── */
      #ticketWrap {
        background: #fff;
        width: 100%;
        max-width: 380px;
        padding: 20px 24px 28px;
        box-shadow: 0 2px 12px rgba(0,0,0,.15);
      }

      /* ── Encabezado ── */
      .tk-header { text-align: center; margin-bottom: 14px; }
      .tk-logo { max-height: 56px; max-width: 160px; object-fit: contain; margin-bottom: 8px; display: block; margin-inline: auto; }
      .tk-taller-nombre { font-size: 18px; font-weight: 800; letter-spacing: -.01em; }
      .tk-subheader { margin-top: 4px; font-size: 12px; line-height: 1.7; color: #333; }

      /* ── Meta del servicio ── */
      .tk-service-meta { margin: 12px 0 10px; }
      .tk-service-no { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
      .tk-meta-row { font-size: 12px; color: #333; line-height: 1.6; }

      /* ── Divisor ── */
      .tk-divider { border: none; border-top: 1.5px solid #000; margin: 8px 0; }

      /* ── Título de sección ── */
      .tk-section-title { font-size: 13px; font-weight: 700; margin: 10px 0 4px; }
      .tk-section-title--center { text-align: center; }

      /* ── Campos ── */
      .tk-field { border-bottom: 1px dashed #aaa; padding: 7px 0 5px; }
      .tk-label { font-weight: 700; font-size: 13px; margin-bottom: 2px; }
      .tk-value { font-size: 13px; color: #111; }

      /* ── Términos ── */
      .tk-section { margin-top: 10px; }
      .tk-terminos { font-size: 11.5px; line-height: 1.65; color: #222; margin-top: 6px; text-align: justify; }

      /* ── Firma ── */
      .tk-firma-wrap { margin: 22px 0 14px; text-align: center; }
      .tk-firma-line { border-bottom: 1.5px solid #000; width: 70%; margin: 0 auto 6px; }
      .tk-firma-label { font-size: 12px; }

      /* ── Redes ── */
      .tk-redes { margin: 10px 0; font-size: 11.5px; text-align: center; line-height: 1.8; color: #333; }

      /* ── Pie ── */
      .tk-footer { text-align: center; margin-top: 14px; border-top: 1px solid #ccc; padding-top: 12px; }
      .tk-pie { font-size: 13px; font-weight: 600; line-height: 1.7; margin-bottom: 8px; }
      .tk-branding { font-size: 10px; color: #888; }

      .tk-empty { text-align: center; padding: 40px; color: #666; }

      /* ── Botones (no se imprimen) ── */
      .tk-actions {
        margin-top: 20px;
        display: flex;
        gap: 10px;
      }
      .tk-btn {
        padding: 9px 20px;
        border-radius: 8px;
        border: none;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
      }
      .tk-btn-primary { background: #18181b; color: #fff; }
      .tk-btn-primary:hover { background: #27272a; }
      .tk-btn-ghost { background: #fff; color: #18181b; border: 1.5px solid #d4d4d8; }
      .tk-btn-ghost:hover { background: #f4f4f5; }

      /* ── Print ── */
      @media print {
        body { background: #fff; padding: 0; display: block; }
        #ticketWrap { box-shadow: none; padding: 0; max-width: 100%; margin: 0; }
        .tk-actions { display: none !important; }

        body[data-paper="80mm"] #ticketWrap { width: 80mm; font-size: 12px; }
        body[data-paper="58mm"] #ticketWrap { width: 58mm; font-size: 11px; }
        body[data-paper="58mm"] .tk-taller-nombre { font-size: 14px; }
        body[data-paper="80mm"] .tk-taller-nombre { font-size: 15px; }

        @page { margin: 4mm; }
        body[data-paper="58mm"] { size: 58mm auto; }
        body[data-paper="80mm"] { size: 80mm auto; }
      }
    </style>
  </head>
  <body>
    <div id="ticketWrap">
      <p class="tk-empty">Cargando ticket…</p>
    </div>

    <div class="tk-actions">
      <button class="tk-btn tk-btn-primary" onclick="window.print()">🖨 Imprimir</button>
      <button class="tk-btn tk-btn-ghost" onclick="window.close()">Cerrar</button>
    </div>

  </body>
</html>
